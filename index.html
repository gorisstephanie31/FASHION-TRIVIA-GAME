<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASHION TRIVIA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HOME PAGE -->
    <div id="page-home" class="page active">
        <h1>FASHION TRIVIA</h1>
        <button class="btn" id="btn-start">LET'S PLAY</button>
        <div class="mode-buttons">
            <button class="btn mode-btn" id="btn-normal">NORMAL MODE</button>
            <button class="btn mode-btn" id="btn-sudden-death">SUDDEN DEATH</button>
        </div>
        <div id="high-score-board">
            <h2>TOP 3 HIGH SCORERS</h2>
            <ol id="high-score-list"></ol>
        </div>
    </div>

    <!-- NAME INPUT PAGE -->
    <div id="page-name" class="page">
        <h2>ENTER YOUR NAME</h2>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="20">
        <button class="btn" id="btn-submit-name">START</button>
    </div>

    <!-- GAME PAGE -->
    <div id="page-game" class="page">
        <div id="game-header">
            <span id="display-name"></span>
            <span id="display-score">SCORE: 0</span>
            <span id="display-mode"></span>
            <button class="btn" id="btn-done">DONE</button>
        </div>
        <div id="question-area">
            <div id="progress"></div>
            <img id="runway-image" src="" alt="RUNWAY IMAGE">
            <div id="season-label"></div>
            <div id="choices"></div>
            <div id="feedback"></div>
            <div id="correct-answer-reveal"></div>
            <button class="btn" id="btn-next" style="display:none;">NEXT</button>
        </div>
    </div>

    <!-- SCORE PAGE -->
    <div id="page-score" class="page">
        <h2 id="score-title"></h2>
        <p id="score-detail"></p>
        <p id="score-mode"></p>
        <div id="sudden-death-message"></div>
        <div id="high-score-board-score">
            <h2>TOP 3 HIGH SCORERS</h2>
            <ol id="high-score-list-score"></ol>
        </div>
        <button class="btn" id="btn-home">RETURN TO HOME</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

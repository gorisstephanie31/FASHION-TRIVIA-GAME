<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASHION TRIVIA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HOME PAGE -->
    <div id="page-home" class="page active">
        <h1>FASHION TRIVIA</h1>
        <p>TEST YOUR KNOWLEDGE OF RUNWAY LOOKS</p>
        <button id="btn-start">LET'S PLAY</button>

        <div id="high-score-board">
            <h2>HIGH SCORES</h2>
            <ol id="high-score-list">
            </ol>
        </div>
    </div>

    <!-- NAME INPUT PAGE -->
    <div id="page-name" class="page">
        <h1>ENTER YOUR NAME</h1>
        <input type="text" id="name-input" placeholder="YOUR NAME" maxlength="20">
        <button id="btn-submit-name">START GAME</button>
    </div>

    <!-- GAME PAGE -->
    <div id="page-game" class="page">
        <div id="game-header">
            <span id="player-name-display"></span>
            <span id="score-display">SCORE: 0</span>
            <button id="btn-done">DONE</button>
        </div>

        <div id="question-counter"></div>

        <div id="image-container">
            <img id="runway-image" src="" alt="RUNWAY LOOK">
        </div>

        <p id="question-text">WHICH DESIGNER CREATED THIS LOOK?</p>

        <div id="choices-container">
        </div>

        <div id="feedback"></div>

        <button id="btn-next" style="display:none;">NEXT</button>
    </div>

    <!-- SCORE PAGE -->
    <div id="page-score" class="page">
        <h1>GAME OVER</h1>
        <div id="final-score-display"></div>
        <button id="btn-home">RETURN TO HOME</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

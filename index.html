<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FASHION TRIVIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PAGE 1: HOME -->
  <div id="page-home" class="page active">
    <div class="home-container">
      <h1 class="title">FASHION TRIVIA</h1>
      <button id="btn-start" class="btn-main">LET'S PLAY</button>
    </div>
  </div>

  <!-- PAGE 2: NAME INPUT -->
  <div id="page-name" class="page">
    <div class="name-container">
      <h2 class="prompt">ENTER YOUR NAME</h2>
      <input type="text" id="name-input" class="name-input" placeholder="YOUR NAME" maxlength="20"/>
      <button id="btn-go" class="btn-main">START GAME</button>
    </div>
  </div>

  <!-- PAGE 3: GAME -->
  <div id="page-game" class="page">
    <div class="game-header">
      <span id="player-name-display" class="player-name"></span>
      <span id="score-display" class="score">SCORE: 0</span>
      <button id="btn-done" class="btn-done">DONE</button>
    </div>
    <div class="game-body">
      <div id="question-counter" class="question-counter">QUESTION 1 OF 10</div>
      <div class="image-wrapper">
        <img id="runway-image" src="" alt="Runway Look" class="runway-img"/>
      </div>
      <p class="question-text">WHICH DESIGNER IS THIS?</p>
      <div id="choices-container" class="choices-container"></div>
      <div id="feedback" class="feedback"></div>
      <button id="btn-next" class="btn-next hidden">NEXT</button>
    </div>
  </div>

  <!-- PAGE 4: SCORE SUMMARY -->
  <div id="page-score" class="page">
    <div class="score-container">
      <h2 class="score-title">GAME OVER</h2>
      <p id="final-message" class="final-message"></p>
      <button id="btn-home" class="btn-main">RETURN TO HOME</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
